<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />

  <title>chwork — Próximamente</title>
  <meta name="description" content="Sitio en preparación. chwork — Asesoría integral en seguridad e higiene del trabajo." />

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800;900&display=swap" />

  <style>
    :root {
      --navy-700: #1b2868;
      --navy-800: #15205a;
      --orange-500: #ee6a26;
      --orange-600: #e8602c;
      --ink-100: #f1f1f1;
      --ink-300: #c8c8c8;
      --ink-500: #6b6b6b;
      --ink-700: #444444;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: "Open Sans", system-ui, -apple-system, sans-serif;
      color: var(--ink-700);
      background: #ffffff;
      background-image:
        repeating-linear-gradient(
          135deg,
          transparent 0,
          transparent 32px,
          rgba(27, 40, 104, 0.025) 32px,
          rgba(27, 40, 104, 0.025) 33px
        );
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    main {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      width: 88px;
      height: 88px;
      color: var(--navy-700);
      margin: 0 auto 40px;
      display: block;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange-600);
      margin: 0 0 16px;
    }

    h1 {
      font-family: "Open Sans", system-ui, sans-serif;
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--navy-700);
      margin: 0;
      line-height: 1.05;
    }

    .rule {
      display: block;
      width: 64px;
      height: 2px;
      background: var(--orange-600);
      margin: 32px auto;
    }

    .tagline {
      font-size: 14px;
      color: var(--ink-500);
      margin: 0;
      line-height: 1.5;
    }

    footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-500);
      font-weight: 600;
    }

    footer a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <svg
      class="logo"
      viewBox="0 0 64 64"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-label="chwork"
    >
      <title>chwork</title>
      <path d="M 4 4 H 50 L 60 14 V 60 H 4 Z" fill="currentColor" />
      <path d="M 50 4 H 60 V 14 Z" fill="#ee6a26" />
      <text x="32" y="38" font-family="Open Sans, system-ui, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0">CH</text>
      <text x="32" y="52" font-family="Open Sans, system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.8">WORK</text>
    </svg>

    <p class="eyebrow">Sitio en preparación</p>
    <h1>Próximamente</h1>
    <span class="rule" aria-hidden="true"></span>
    <p class="tagline">Asesoría integral en seguridad e higiene del trabajo.</p>
  </main>

  <footer>
    <span>chwork &middot; CABA y Provincia de Buenos Aires</span>
  </footer>
</body>
</html>
